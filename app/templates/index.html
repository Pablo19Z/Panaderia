<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido a la Panadería</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Bienvenido a la Panadería</h1>
    <div class="productos">
        {% for producto in productos %}
        <div class="producto">
            <h2>{{ producto.nombre }}</h2>
            <p>{{ producto.descripcion }}</p>
            <p>Precio: ${{ producto.precio_min }} - ${{ producto.precio_max }}</p>
            {% if producto.imagen %}
            <img src="{{ url_for('static', filename=producto.imagen) }}" alt="{{ producto.nombre }}" style="max-width: 200px;">
            {% endif %}
        </div>
        {% endfor %}
    </div>
</body>
</html>
