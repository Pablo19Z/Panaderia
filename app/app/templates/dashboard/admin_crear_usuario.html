{% extends "base.html" %}

{% block title %}Crear Usuario - Admin{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 py-8">
    <div class="container mx-auto px-4 max-w-2xl">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Crear Nuevo Usuario</h1>
            <p class="text-gray-400">Agrega un nuevo empleado al sistema</p>
        </div>

        <!-- Formulario -->
        <div class="bg-gray-800 rounded-xl shadow-xl p-8">
            <form method="POST" class="space-y-6">
                <!-- Información Personal -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="nombre" class="block text-sm font-medium text-gray-300 mb-2">Nombre Completo *</label>
                        <input type="text" id="nombre" name="nombre" required
                               class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                               placeholder="Ej: Juan Pérez">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email *</label>
                        <input type="email" id="email" name="email" required
                               class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                               placeholder="juan@migasdeoro.com">
                    </div>
                </div>

                <!-- Contraseña -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Contraseña *</label>
                    <input type="password" id="password" name="password" required minlength="6"
                           class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                           placeholder="Mínimo 6 caracteres">
                </div>

                <!-- Rol -->
                <div>
                    <label for="rol" class="block text-sm font-medium text-gray-300 mb-2">Rol *</label>
                    <select id="rol" name="rol" required
                            class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500/20 transition-all duration-300">
                        <option value="">Seleccionar rol</option>
                        <option value="chef">Chef / Jefe de Cocina</option>
                        <option value="vendedor">Vendedor</option>
                        <option value="cocinero">Cocinero</option>
                    </select>
                </div>

                <!-- Información de Contacto -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="telefono" class="block text-sm font-medium text-gray-300 mb-2">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono"
                               class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                               placeholder="Ej: +57 300 123 4567">
                    </div>
                    <div>
                        <label for="direccion" class="block text-sm font-medium text-gray-300 mb-2">Dirección</label>
                        <input type="text" id="direccion" name="direccion"
                               class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500/20 transition-all duration-300"
                               placeholder="Dirección completa">
                    </div>
                </div>

                <!-- Botones -->
                <div class="flex justify-between pt-6">
                    <a href="{{ url_for('dashboard.admin_usuarios') }}" 
                       class="px-6 py-3 bg-gray-600 hover:bg-gray-500 text-white rounded-lg font-semibold transition-all duration-300">
                        Cancelar
                    </a>
                    <button type="submit" 
                            class="px-8 py-3 bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white rounded-lg font-semibold transition-all duration-300 shadow-lg hover:shadow-xl">
                        Crear Usuario
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
